version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -e NEXT_PUBLIC_SUPABASE_URL -e NEXT_PUBLIC_SUPABASE_ANON_KEY -e SUPABASE_SERVICE_ROLE_KEY -e NEXT_PUBLIC_RAZORPAY_KEY_ID -e RAZORPAY_KEY_ID -e RAZORPAY_KEY_SECRET -e RESEND_API_KEY -e NEXT_PUBLIC_SITE_URL >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
